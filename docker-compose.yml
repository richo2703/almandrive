services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: theorie
      POSTGRES_PASSWORD: theorie
      POSTGRES_DB: theorie_direkt
    ports:
      - "5432:5432"
    volumes:
      - theorie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theorie -d theorie_direkt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  theorie_postgres_data:
